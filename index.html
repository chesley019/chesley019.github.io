<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的轮播图</title>
    
    <!-- 这里是 CSS 样式，负责轮播图的外观 -->
    <style>
        /* 轮播图最外层大盒子 */
        .carousel-container {
            position: relative;
            width: 80%;
            max-width: 600px;
            margin: 50px auto;
            overflow: hidden; /* 隐藏超出盒子范围的其他图片 */
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        /* 包裹所有图片的整条长轨道 */
        .carousel-track {
            display: flex;
            transition: transform 0.4s ease-in-out; /* 让切换时有平滑滚动的动画效果 */
            width: 100%;
        }

        /* 每张图片本身 */
        .carousel-track img {
            width: 100%; /* 确保每张图片刚好占满整个容器的宽度 */
            display: block;
            height: auto;
        }

        /* 左右箭头的通用样式 */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%); /* 让箭头在垂直方向完美居中 */
            background-color: rgba(0, 0, 0, 0.5); /* 半透明黑底 */
            color: white;
            border: none;
            padding: 12px 16px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%; /* 圆形按钮 */
            transition: background 0.3s;
        }

        .carousel-btn:hover {
            background-color: rgba(0, 0, 0, 0.8); /* 鼠标悬停时变深 */
        }

        /* 定位左箭头在左边，右箭头在右边 */
        .prev-btn { left: 15px; }
        .next-btn { right: 15px; }
    </style>
</head>
<body>

    <!-- 轮播图 HTML 结构 -->
    <div class="carousel-container">
        <!-- 轨道，里面横着放了所有图片 -->
        <div class="carousel-track" id="track">
            <img src="/images/OR_Day.jpg" alt="图片1">
            <img src="/images/OR_Day_2.jpg" alt="图片2">
            <!-- 你可以在这里继续复制粘贴，加图片3、图片4... 代码会自动适配 -->
        </div>

        <!-- 左右切换按钮 -->
        <button class="carousel-btn prev-btn" onclick="moveSlide(-1)">&#10094;</button>
        <button class="carousel-btn next-btn" onclick="moveSlide(1)">&#10095;</button>
    </div>

    <!-- 这里是 JavaScript，负责处理点击箭头的逻辑 -->
    <script>
        let currentIndex = 0; // 当前显示的是第几张图（0代表第1张）
        const track = document.getElementById('track');
        
        function moveSlide(direction) {
            // 获取里面一共有多少张图片
            const totalSlides = track.children.length;
            
            // 计算更新后的图片索引
            currentIndex = currentIndex + direction;

            // 边缘保护：如果到头了，自动循环
            if (currentIndex < 0) {
                currentIndex = totalSlides - 1; // 在第一张点左箭头，跳到最后一张
            } else if (currentIndex >= totalSlides) {
                currentIndex = 0; // 在最后一张点右箭头，回到第一张
            }

            // 【核心原理】：通过给图片大轨道设置向左平移，把对应的图片露出来
            // 比如第1张平移 0%，第2张向左平移 -100%，第3张向左平移 -200%
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
        }
    </script>

</body>
</html>
